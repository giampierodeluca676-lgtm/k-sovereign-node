<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keygap Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; background: #050505; color: #00ff95; font-family: 'Orbitron', sans-serif; 
            display: flex; height: 100vh; overflow: hidden; 
            background-image: linear-gradient(rgba(0, 255, 149, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 255, 149, 0.05) 1px, transparent 1px); 
            background-size: 30px 30px; 
        }
        .sidebar { 
            width: 280px; border-right: 1px solid #00ff95; padding: 25px; 
            display: flex; flex-direction: column; gap: 15px; background: rgba(0,0,0,0.9); 
            box-shadow: 5px 0 15px rgba(0,255,149,0.1); z-index: 10;
        }
        .main { 
            flex-grow: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px; position: relative;
        }
        h1 { 
            font-size: 1.4rem; text-align: center; border-bottom: 1px solid #00ff95; 
            padding-bottom: 15px; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px;
        }
        .btn { 
            display: block; text-align: center; text-decoration: none; color: #00ff95; 
            border: 1px solid #00ff95; padding: 15px; transition: 0.3s; font-size: 0.9rem; 
            letter-spacing: 1px; background: rgba(0, 255, 149, 0.05); cursor: pointer; 
        }
        .btn:hover { background: #00ff95; color: #000; box-shadow: 0 0 15px #00ff95; transform: scale(1.02); }
        .search-box { 
            width: 100%; max-width: 700px; border: 1px solid #00ff95; padding: 40px; 
            background: rgba(0, 255, 149, 0.05); box-shadow: 0 0 30px rgba(0, 255, 149, 0.1); backdrop-filter: blur(5px);
        }
        .search-form { display: flex; gap: 10px; margin-top: 25px; }
        input[type="text"] { 
            flex-grow: 1; background: rgba(0,0,0,0.5); border: 1px solid #00ff95; color: #00ff95; 
            padding: 15px 20px; font-family: 'Orbitron', sans-serif; font-size: 1.1rem; outline: none; letter-spacing: 1px;
        }
        input[type="text"]:focus { box-shadow: inset 0 0 10px rgba(0, 255, 149, 0.3); background: rgba(0,255,149,0.1); }
        button[type="submit"] { 
            background: #00ff95; color: #000; border: none; padding: 15px 30px; 
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.3s; 
        }
        button[type="submit"]:hover { box-shadow: 0 0 20px #00ff95; transform: scale(1.05); }
        .status { font-size: 0.85rem; color: #00ff95; margin-bottom: 10px; opacity: 0.7; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>Keygap Dashboard</h1>
        <div class="status" style="text-align:center; margin-bottom:10px;">► MODULI RAPIDI</div>
        <a href="https://www.amazon.it/s?k=offerte&tag=keygap-21&low-price=&high-price=20" target="_blank" class="btn">SOTTO 20€</a>
        <a href="https://www.amazon.it/warehouse?tag=keygap-21" target="_blank" class="btn">WAREHOUSE</a>
        <a href="https://www.amazon.it/gp/goldbox?tag=keygap-21" target="_blank" class="btn">OFFERTE LAMPO</a>
        <a href="https://www.amazon.it/s?k=informatica&tag=keygap-21" target="_blank" class="btn">TECH & PC</a>
        <a href="https://www.amazon.it/s?k=casa+e+cucina&tag=keygap-21" target="_blank" class="btn">HOME & LIVING</a>
    </div>
    
    <div class="main">
        <div class="search-box">
            <div class="status">► SYSTEM_STATUS: ONLINE | UPLINK: AMAZON.IT SECURE</div>
            <h2 style="margin: 0; font-size: 2.2rem; text-transform: uppercase;">Scanner Network</h2>
            <form action="https://www.amazon.it/s" method="GET" class="search-form" target="_blank">
                <input type="text" name="k" placeholder="INSERISCI NOME PRODOTTO..." required autocomplete="off">
                <input type="hidden" name="tag" value="keygap-21">
                <input type="hidden" name="ref" value="nb_sb_noss">
                <button type="submit">ESEGUI SCANNER</button>
            </form>
        </div>
    </div>
</body>
</html>
